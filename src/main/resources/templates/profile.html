<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout">
<head>
    <title>My Profile</title>
</head>
<body>
    <div th:fragment="content">
        <section class="profile-header">
            <div class="profile-header-overlay"></div>
        </section>

        <section class="profile-main py-5">
            <div class="container">
                <div class="profile-card card shadow-lg border-0">
                    <div class="card-body">
                        <div class="text-center">
                            <div class="profile-avatar-wrapper">
                                <img th:src="${user != null ? 'https://i.pravatar.cc/200?u=' + user.email : '/css/images/default-avatar.png'}"
                                     alt="Profile avatar"
                                     class="profile-avatar rounded-circle shadow-sm">
                            </div>
                            <h2 class="mt-3 mb-0" th:text="${user != null ? user.username : 'Guest User'}">Guest User</h2>
                            <p class="text-muted mb-1" th:text="${user != null ? (user.role == 'founder' ? 'Founder' : 'Investor') : 'Visitor'}">Founder</p>

                            <div class="d-flex justify-content-center gap-3 mb-4">
                                <a th:href="@{/my-startup}" class="btn btn-outline-primary">My Startups</a>
                                <a th:href="@{/submit}" class="btn btn-primary">Submit an Idea</a>
                                <a th:href="@{/discover}" class="btn btn-outline-primary">Browse</a>
                            </div>

                            <div th:if="${user != null}" class="row justify-content-center mb-4">
                                <div class="col-md-3 col-6 text-center">
                                    <h3 class="mb-0" th:text="${ideasCount}">0</h3>
                                    <p class="text-muted mb-0">Your ideas</p>
                                </div>
                                <div class="col-md-3 col-6 text-center">
                                    <h3 class="mb-0" th:text="${totalIdeas}">0</h3>
                                    <p class="text-muted mb-0">Total ideas</p>
                                </div>
                            </div>

                            <p class="lead text-muted px-lg-5" th:text="${user != null ? 'Manage your startup ideas, connect with investors, and track your progress.' : 'Log in to start sharing your ideas and discovering new startups.'}">Build and grow your ideas.</p>
                        </div>

                        <div th:if="${user != null}">
                            <h4 class="mt-5 mb-3">Your Latest Startups</h4>
                            <div class="row">
                                <div th:if="${#lists.isEmpty(myIdeas)}" class="col-12">
                                    <div class="alert alert-info">You haven’t submitted any ideas yet. Submit one to get started!</div>
                                </div>
                                <div class="col-md-4 mb-3" th:each="idea : ${myIdeas}">
                                    <div class="card h-100 border-0 shadow-sm">
                                        <div class="card-body d-flex flex-column">
                                            <h5 class="card-title" th:text="${idea.title}">Idea Title</h5>
                                            <p class="card-text text-muted flex-grow-1" th:text="${idea.description}">Idea description</p>
                                            <div class="d-flex justify-content-between align-items-center mt-3">
                                                <a th:href="@{/startup/{id}(id=${idea.id})}" class="btn btn-sm btn-outline-primary">View</a>
                                                <span class="text-muted small" th:text="${#numbers.formatDecimal(idea.aiScore, 1, 'POINT', 1, 'NONE')} + ' AI'">42 AI</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div th:if="${user == null}" class="text-center mt-4">
                            <a class="btn btn-primary me-2" th:href="@{/login}">Login</a>
                            <a class="btn btn-outline-primary" th:href="@{/signup/founder}">Sign Up</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
