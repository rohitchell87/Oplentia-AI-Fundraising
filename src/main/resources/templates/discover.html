<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout">
<head>
    <title>Discover Startups</title>
</head>
<body>
    <div th:fragment="content">
        <section class="py-5">
            <div class="container">
                <h1 class="text-center mb-4">Discover Startups</h1>
                <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <p class="text-center">Explore innovative startup ideas evaluated by Oplentia's AI.</p>
                <div class="row" th:if="${ideas != null and !ideas.isEmpty()}">
                    <div class="col-md-4 mb-4" th:each="idea : ${ideas}">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${idea.title}">Startup Title</h5>
                                <p class="card-text" th:text="${idea.description}">Description...</p>
                                <a th:href="@{/startup/{id}(id=${idea.id})}" class="btn btn-primary">View</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${ideas == null or ideas.isEmpty()}" class="text-center">
                    <p>No ideas submitted yet. Be the first to <a href="/submit">submit an idea</a>!</p>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
