<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout">
<head>
    <title>AI Leaderboard</title>
</head>
<body>
    <div th:fragment="content">
        <section class="py-5">
            <div class="container">
                <h1 class="text-center mb-4">AI Leaderboard</h1>
                <p class="text-center">Top startup ideas ranked by AI evaluation score.</p>
                <div class="row" th:if="${ideas != null and !ideas.isEmpty()}">
                    <div class="col-md-8 mx-auto">
                        <div class="list-group">
                            <div th:each="idea, iterStat : ${ideas}" class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-1" th:text="${idea.title}">Idea Title</h5>
                                    <p class="mb-1" th:text="${idea.description}">Description</p>
                                    <small th:text="'Founder: ' + ${idea.founderName}">Founder</small>
                                </div>
                                <div class="text-end">
                                    <span class="badge bg-primary rounded-pill" th:text="${#numbers.formatDecimal(idea.aiScore, 1, 2)} + ' pts'">Score</span>
                                    <br>
                                    <small class="text-muted">Rank #<span th:text="${iterStat.index + 1}"></span></small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${ideas == null or ideas.isEmpty()}" class="text-center">
                    <p>No ideas evaluated yet.</p>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
