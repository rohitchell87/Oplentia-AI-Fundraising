<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout">
<head>
    <title>Login</title>
</head>
<body>
    <div th:fragment="content">
        <section class="py-5">
            <div class="container">
                <h1 class="text-center mb-4">Login</h1>
                <p class="text-center mb-5">Welcome back! Please log in to your account.</p>
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <form action="/login" method="post" class="card p-4">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
                        </form>
                        <p class="text-center mt-3">Don't have an account? <a href="/signup/founder">Sign Up</a></p>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
