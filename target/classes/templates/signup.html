<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout">
<head>
    <title th:text="${title}">Sign Up</title>
</head>
<body>
    <div th:fragment="content">
        <section class="py-5">
            <div class="container">
                <h1 class="text-center mb-4" th:text="${title}">Sign Up</h1>
                <p class="text-center mb-5">Join Oplentia as a <span th:text="${userType}">user</span> and start your journey.</p>
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <form action="/signup" method="post" class="card p-4">
                            <input type="hidden" name="userType" th:value="${userType}">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Sign Up</button>
                        </form>
                        <p class="text-center mt-3">Already have an account? <a href="/login">Login</a></p>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
